<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Очікування підтвердження</title>
<link rel="stylesheet" href="/assets/app.css" />
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
<style>
  body { align-items: center; justify-content: center; }
  .card { width: 100%; max-width: 440px; background: var(--panel); border: 1px solid var(--hair); border-radius: 14px; padding: 32px; text-align: center; }
  .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: .14em; text-transform: none; color: var(--accent); font-weight: 600; }
  h1 { margin: 8px 0 12px; font-size: 22px; }
  p { color: var(--muted); margin: 0 0 22px; line-height: 1.6; }
  .who { font-family: var(--mono); font-size: 12px; color: var(--faint); margin-bottom: 18px; }
</style>
</head>
<body>
  <div class="card">
    <img src="/assets/derant-logo.svg" alt="DERANT" class="auth-logo" />
    <div class="eyebrow">Перекладацький верстат</div>
    <h1>Акаунт на розгляді</h1>
    <div class="who" id="who"></div>
    <p>Твоя реєстрація очікує підтвердження адміністратором. Щойно акаунт схвалять, зʼявиться доступ до Верстата й Дашборда. Спробуй оновити сторінку трохи згодом.</p>
    <button id="refresh" class="primary">Оновити</button>
    <button id="logout">Вийти</button>
  </div>
<script>
  fetch('/api/me').then(r => r.ok ? r.json() : Promise.reject()).then(d => {
    document.getElementById('who').textContent = d.user.email;
    // already approved? go to the app
    if (d.user.isAdmin || d.user.status === 'approved') window.location.href = '/';
  }).catch(() => window.location.href = '/login');
  document.getElementById('refresh').onclick = () => window.location.reload();
  document.getElementById('logout').onclick = async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login';
  };
</script>
</body>
</html>
